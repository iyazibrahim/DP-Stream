services:
  db:
    image: mysql:8.4
    container_name: video-portal-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-video_portal}
      MYSQL_USER: ${DB_USER:-video_app}
      MYSQL_PASSWORD: ${DB_PASSWORD:-video_app_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password_change_me}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - db_data:/var/lib/mysql
      - ./migrations:/docker-entrypoint-initdb.d

  app:
    build: .
    container_name: video-portal-app
    restart: unless-stopped
    # Intel VAAPI (/dev/dri) is optional — only on NUC hosts with iGPU.
    # Use: docker compose -f docker-compose.yml -f docker-compose.ubuntu-vaapi.yml up -d
    env_file:
      - .env
    environment:
      # Inside Docker, MySQL is the `db` service — not 127.0.0.1
      DB_HOST: db
      DB_PORT: "3306"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./media:/app/media
    ports:
      - "${APP_HOST_PORT:-3000}:${PORT:-3000}"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const p=process.env.PORT||3000;fetch('http://127.0.0.1:'+p+'/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  # nginx:
